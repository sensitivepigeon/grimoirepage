<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grimoire Bargain Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Bargain Generator</h1>
    <p class="subtitle">Fill in the bargain, get a quest JSON file.</p>

    <!-- Quest ID is NOT part of the quest JSON. It's the file path the
         quest lives at (e.g. tier1/iron_bounty). We keep it separate
         from the schema fields because it names the FILE, it isn't a
         field INSIDE the file. -->
    <div class="field">
      <label for="quest-id">Quest ID (file path)</label>
      <input type="text" id="quest-id" placeholder="tier1/iron_bounty">
      <small class="help">Used only to name the downloaded file. Not written inside the JSON.</small>
    </div>

    <hr>

    <!-- JavaScript fills this with one block per schema field. -->
    <div id="form-fields"></div>

    <div class="buttons">
      <button id="generate-btn" type="button">Generate JSON</button>
      <button id="copy-btn" type="button">Copy</button>
      <button id="download-btn" type="button">Download .json</button>
    </div>

    <pre id="errors" class="errors"></pre>

    <textarea id="output" class="output" readonly
      placeholder="Your quest JSON appears here."></textarea>
  </main>

  <script src="script.js"></script>
</body>
</html>
